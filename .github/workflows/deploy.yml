name: Deploy Pharmacy One Stop

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/pharmacy-one-stop

jobs:
  # ============================================================
  # Job 1: Lint and Test
  # ============================================================
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pharmacy_one_stop_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Generate Prisma client
        working-directory: server
        run: npx prisma generate

      - name: Run server lint
        working-directory: server
        run: npm run lint

      - name: Run server tests
        working-directory: server
        run: npm test --if-present
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pharmacy_one_stop_test?schema=public
          JWT_SECRET: test-jwt-secret
          JWT_REFRESH_SECRET: test-refresh-secret
          NODE_ENV: test

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Run client lint
        working-directory: client
        run: npm run lint

      - name: Build client
        working-directory: client
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api

  # ============================================================
  # Job 2: Build and push server Docker image
  # ============================================================
  build-server:
    name: Build Server Image
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/Dockerfile.prod.server
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-server:latest
            ${{ env.IMAGE_PREFIX }}-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Job 3: Build and push client Docker image
  # ============================================================
  build-client:
    name: Build Client Image
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push client image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/Dockerfile.prod.client
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-client:latest
            ${{ env.IMAGE_PREFIX }}-client:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Job 4: Deploy to EC2
  # ============================================================
  deploy:
    name: Deploy to AWS EC2
    needs: [build-server, build-client]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy infrastructure files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "infrastructure/docker-compose.prod.yml,infrastructure/nginx.conf,infrastructure/.env.production.example"
          target: /home/${{ secrets.EC2_USERNAME }}/pharmacy-one-stop
          strip_components: 0

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/${{ secrets.EC2_USERNAME }}/pharmacy-one-stop/infrastructure

            # Log in to GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Set image tag
            export IMAGE_TAG=${{ github.sha }}
            export DOCKER_REGISTRY=ghcr.io/${{ github.repository_owner }}

            # Pull latest images
            docker compose -f docker-compose.prod.yml pull server client

            # Deploy with zero-downtime
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Wait for health checks
            sleep 15

            # Verify deployment
            docker compose -f docker-compose.prod.yml ps

            # Clean up old images
            docker image prune -f
