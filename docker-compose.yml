version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: p1s-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pharmacy_one_stop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: p1s-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: p1s-server
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/pharmacy_one_stop?schema=public
      JWT_SECRET: dev-jwt-secret-pharmacy-one-stop-2026
      JWT_REFRESH_SECRET: dev-refresh-secret-pharmacy-one-stop-2026
      PORT: 4000
      NODE_ENV: development
      FRONTEND_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./server/src:/app/src
      - ./server/prisma:/app/prisma

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: p1s-client
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    depends_on:
      - server

volumes:
  pgdata:
  redisdata:
